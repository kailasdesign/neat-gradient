<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
margin:0;
padding:0;
overflow:hidden;
background:black;
}

#gradient {
width:100vw;
height:100vh;
}
</style>

</head>

<body>

<canvas id="gradient"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script type="module">

import { NeatGradient } from "https://cdn.jsdelivr.net/npm/@firecms/neat@0.4.0/dist/index.js";

const config = {
colors: [
{ color: "#FF5772", enabled: true },
{ color: "#4CB4BB", enabled: true },
{ color: "#FFC600", enabled: true },
{ color: "#8B6AE6", enabled: true }
],
speed: 4,
horizontalPressure: 3,
verticalPressure: 4,
waveFrequencyX: 3,
waveFrequencyY: 3,
waveAmplitude: 8,
shadows: 1,
highlights: 5,
colorBrightness: 1,
colorSaturation: 7,
wireframe: false,
colorBlending: 8,
backgroundColor: "#003FFF",
backgroundAlpha: 1,
grainScale: 3,
grainIntensity: 0.3,
grainSpeed: 1,
resolution: 1
};

new NeatGradient({
ref: document.getElementById("gradient"),
...config
});

</script>

</body>
</html>
