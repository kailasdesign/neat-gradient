<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
}

#gradient{
position:fixed;
width:100vw;
height:100vh;
}
</style>

</head>

<body>

<canvas id="gradient"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://neat.firecms.co/assets/neat-gradient.js"></script>

<script>

const config = {
colors: [
{ color: '#FFFFFF', enabled: true },
{ color: '#E0E0E0', enabled: true },
{ color: '#FFFFFF', enabled: true },
{ color: '#ff5a5f', enabled: true },
{ color: '#c81d25', enabled: true },
{ color: '#F90046', enabled: false }
],
speed: 2,
horizontalPressure: 4,
verticalPressure: 3,
waveFrequencyX: 0,
waveFrequencyY: 0,
waveAmplitude: 0,
shadows: 2,
highlights: 7,
colorBrightness: 1,
colorSaturation: 8,
wireframe: false,
colorBlending: 5,
backgroundColor: '#FF0000',
backgroundAlpha: 1,
resolution: 0.5
};

new NeatGradient({
ref: document.getElementById("gradient"),
...config
});

</script>

</body>
</html>
