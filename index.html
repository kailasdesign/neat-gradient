<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
}

#gradient{
width:100vw;
height:100vh;
}
</style>

</head>

<body>

<canvas id="gradient"></canvas>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { NeatGradient } from "https://cdn.jsdelivr.net/npm/@firecms/neat@latest/dist/index.js";

const config = {
    colors: [
        { color: '#FFFFFF', enabled: true },
        { color: '#E0E0E0', enabled: true },
        { color: '#FFFFFF', enabled: true },
        { color: '#ff5a5f', enabled: true },
        { color: '#c81d25', enabled: true },
        { color: '#F90046', enabled: false },
    ],
    speed: 2,
    horizontalPressure: 4,
    verticalPressure: 3,
    waveFrequencyX: 0,
    waveFrequencyY: 0,
    waveAmplitude: 0,
    shadows: 2,
    highlights: 7,
    colorBrightness: 1,
    colorSaturation: 8,
    wireframe: false,
    colorBlending: 5,
    backgroundColor: '#FF0000',
    backgroundAlpha: 1,
    grainScale: 0,
    grainSparsity: 0,
    grainIntensity: 0,
    grainSpeed: 0,
    resolution: 0.5
};

new NeatGradient({
    ref: document.getElementById("gradient"),
    ...config
});

</script>

</body>
</html>
