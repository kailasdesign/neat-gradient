<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
}

#gradient{
width:100vw;
height:100vh;
}
</style>

</head>

<body>

<canvas id="gradient"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/@firecms/neat"></script>

<script>

const gradient = new NeatGradient({
el: document.getElementById("gradient"),
colors: [
{ color: "#ff6b6b", enabled: true },
{ color: "#6bc1ff", enabled: true },
{ color: "#9d6bff", enabled: true }
],
speed: 2,
horizontalPressure: 3,
verticalPressure: 3,
waveFrequencyX: 2,
waveFrequencyY: 2,
waveAmplitude: 5,
shadows: 1,
highlights: 4,
backgroundColor: "#000000"
});

</script>

</body>
</html>
